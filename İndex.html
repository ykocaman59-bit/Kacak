<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Runner Game</title>
</head>

<body style="margin:0; background:#222; color:white; text-align:center;">

<h1>OYUN ÇALIŞIYOR</h1>

<canvas id="game" width="600" height="200" style="background:white;"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// arka plan temizle
ctx.clearRect(0, 0, canvas.width, canvas.height);

// kırmızı kare çiz
ctx.fillStyle = "red";
ctx.fillRect(50, 50, 100, 100);

// test yazısı
ctx.fillStyle = "black";
ctx.font = "20px Arial";
ctx.fillText("OYUN AKTİF", 200, 100);
</script>

</body>
</html>
